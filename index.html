<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Diaporama Ken Burns */
        .slideshow {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .slideshow img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: moveAndFade 18s infinite ease-in-out;
        }

        .slideshow img:nth-child(1) { animation-delay: 0s; }
        .slideshow img:nth-child(2) { animation-delay: 6s; }
        .slideshow img:nth-child(3) { animation-delay: 12s; }

        @keyframes moveAndFade {
            0% { opacity: 0; transform: scale(1.05); }
            10% { opacity: 1; }
            33% { opacity: 1; }
            45% { opacity: 0; }
            100% { opacity: 0; transform: scale(1.2); }
        }

        /* Superposition & Interface */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        /* --- STYLES COMMUNS DES BOX --- */
        .side-box {
            position: absolute;
            z-index: 3;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .box-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 5px;
        }

        .box-content {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.6;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* --- PLACEMENT --- */
        .side-box-left {
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
            border-left: 4px solid #fff;
        }

        .side-box-right {
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
            border-right: 4px solid #fff;
            text-align: right;
        }

        /* --- NOUVELLE BOX LORE --- */
        .side-box-lore {
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            text-align: center;
            border-bottom: 4px solid #ff3e3e;
        }

        .highlight-cmd {
            color: #ff3e3e;
            font-weight: bold;
        }

        /* Zone Site (Haut Droite) */
        .header-info {
            position: absolute;
            top: 40px;
            right: 50px;
            z-index: 3;
            text-align: right;
        }

        #site-name {
            color: white;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0px 0px 15px rgba(0,0,0,0.7);
            border-bottom: 2px solid rgba(255,255,255,0.5);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        /* Horloge et Date */
        #datetime-container {
            position: absolute;
            bottom: 14%;
            left: 50px;
            z-index: 3;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
        }

        #time {
            font-size: 48px;
            font-weight: 700;
            display: block;
        }

        #date {
            font-size: 18px;
            font-weight: 400;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Zone de messages */
        #message-container {
            position: absolute;
            bottom: 8%;
            left: 50px;
            z-index: 3;
            color: white;
            font-size: 22px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

        #message-container::before {
            content: "";
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #fff;
            margin-right: 15px;
            box-shadow: 0 0 10px #fff;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="side-box side-box-lore">
        <div class="box-title">Archives : Lore</div>
        <div class="box-content">
            L'Abri-315 est tombé. <br>
            Les résidents sont retranchés dans une zone sécurisée pour le moment.
        </div>
    </div>

    <div class="side-box side-box-left">
        <div class="box-title">Commandes In-Game</div>
        <div class="box-content">
            <span class="highlight-cmd">!bp</span><br>
            <span class="highlight-cmd">!boutique</span>
        </div>
    </div>

    <div class="side-box side-box-right">
        <div class="box-title">Fondateurs</div>
        <div class="box-content" style="margin-bottom: 15px;">
            draco_tve<br>
            alex
        </div>
        <div class="box-title">Beta Testeurs</div>
        <div class="box-content">
            nika<br>
            TMT
        </div>
    </div>

    <div class="header-info">
        <div id="site-name">ABRI-315</div>
    </div>

    <div class="slideshow">
        <img src="https://i.imgur.com/Hgof2Mb.jpeg" alt="1">
        <img src="https://i.imgur.com/A2Zq5Kz.jpeg" alt="2">
        <img src="https://i.imgur.com/FyRztA4.jpeg" alt="3">
    </div>

    <div id="datetime-container">
        <span id="time">00:00:00</span>
        <span id="date">Chargement...</span>
    </div>

    <div id="message-container">Initialisation...</div>

    <script>
        const loadingMessages = [
            'Initialisation du système',
            'Vérification des accès développeurs',
            'Optimisation des bases de données',
            'Mise à jour du protocole de l\'abri-315',
            'En attente de déploiement'
        ];

        const container = document.getElementById('message-container');
        let index = 0;

        function updateMessage() {
            container.style.opacity = 0;
            setTimeout(() => {
                index = (index + 1) % loadingMessages.length;
                container.textContent = loadingMessages[index];
                container.style.opacity = 1;
            }, 600);
        }
        setInterval(updateMessage, 4000);

        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', options);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>

</body>
</html>
