<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire Orion — Chargement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold2:#8b6914;--gold3:#f0dba0;
  --bg:#0a0704;--bg2:#110e08;
  --border:#2a1f10;--border2:#4a3820;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}

/* ===== CANVAS ETOILES ===== */
#stars{position:fixed;inset:0;z-index:0}

/* ===== CHATEAU SILHOUETTE ===== */
.castle{position:fixed;bottom:0;left:0;right:0;z-index:1;height:45vh;pointer-events:none}
.castle svg{width:100%;height:100%}

/* ===== BRUME ===== */
.mist{
  position:fixed;bottom:0;left:0;right:0;height:35vh;z-index:2;
  background:linear-gradient(to top,rgba(10,7,4,.98) 0%,rgba(10,7,4,.7) 40%,transparent 100%);
}

/* ===== CONTENU PRINCIPAL ===== */
.wrap{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}

/* Logo / Titre */
.logo-area{text-align:center;margin-bottom:40px;animation:fadeDown .8s ease both}
.logo-eyebrow{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:13px;letter-spacing:6px;color:var(--gold2);
  margin-bottom:14px;opacity:.8;
}
.logo-sub{
  font-family:'Cinzel',serif;
  font-size:clamp(10px,1.5vw,14px);
  letter-spacing:8px;
  color:var(--gold2);
  margin-top:14px;
  text-transform:uppercase;
}

/* Conteneur logo avec cercles */
.logo-container{
  position:relative;
  width:240px;height:240px;
  margin:0 auto;
  display:flex;align-items:center;justify-content:center;
}

/* Cercles tournants */
.ring{
  position:absolute;border-radius:50%;
  border:1px solid transparent;
  border-top-color:var(--gold);
  border-right-color:var(--gold2);
  box-shadow:0 0 8px rgba(201,168,76,.15);
}
.ring1{
  width:220px;height:220px;
  border-width:1.5px;
  border-top-color:var(--gold);
  border-right-color:transparent;
  border-bottom-color:var(--gold2);
  border-left-color:transparent;
  animation:spin1 8s linear infinite;
}
.ring2{
  width:196px;height:196px;
  border-width:1px;
  border-top-color:transparent;
  border-right-color:var(--gold);
  border-bottom-color:transparent;
  border-left-color:var(--gold2);
  animation:spin2 5s linear infinite;
}
.ring3{
  width:170px;height:170px;
  border-width:1px;
  border-top-color:var(--gold2);
  border-right-color:transparent;
  border-bottom-color:var(--gold);
  border-left-color:transparent;
  animation:spin1 12s linear infinite reverse;
  opacity:.5;
}

/* Petits losanges sur les cercles */
.ring1::before,.ring1::after,.ring2::before,.ring2::after{
  content:'';position:absolute;
  width:6px;height:6px;
  background:var(--gold);
  transform:rotate(45deg);
}
.ring1::before{top:-4px;left:50%;margin-left:-3px}
.ring1::after{bottom:-4px;left:50%;margin-left:-3px;background:var(--gold2)}
.ring2::before{right:-4px;top:50%;margin-top:-3px}
.ring2::after{left:-4px;top:50%;margin-top:-3px;background:var(--gold2)}

/* Logo image */
.logo-img-wrap{
  position:relative;z-index:2;
  width:140px;height:140px;
  display:flex;align-items:center;justify-content:center;
}
.logo-img{
  width:100%;height:100%;
  object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(201,168,76,.3));
  animation:logoPulse 3s ease-in-out infinite;
}

@keyframes spin1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 12px rgba(201,168,76,.25))}
  50%{filter:drop-shadow(0 0 24px rgba(201,168,76,.5))}
}

@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%,100%{text-shadow:0 0 80px rgba(201,168,76,.2)}50%{text-shadow:0 0 120px rgba(201,168,76,.4),0 0 40px rgba(201,168,76,.3)}}

/* Ornement */
.ornament{display:flex;align-items:center;gap:16px;margin-bottom:40px;animation:fadeIn .8s .3s ease both}
.orn-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--border2))}
.orn-line.r{background:linear-gradient(90deg,var(--border2),transparent)}
.orn-gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg)}
.orn-gem-sm{width:5px;height:5px;background:var(--gold2);transform:rotate(45deg);margin:0 4px}

/* Citation / Lore */
.quote{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:clamp(13px,1.8vw,17px);
  color:rgba(212,180,131,.6);
  text-align:center;
  max-width:600px;
  line-height:1.8;
  margin-bottom:50px;
  animation:fadeIn .8s .5s ease both;
  min-height:48px;
}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Barre de chargement */
.loading-wrap{width:min(500px,80vw);animation:fadeIn .8s .7s ease both}
.loading-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.loading-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold2);text-transform:uppercase}
.loading-pct{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);font-weight:600}

/* Barre principale */
.bar-outer{
  height:6px;background:rgba(42,31,16,.6);
  border:1px solid var(--border);
  position:relative;overflow:hidden;
  margin-bottom:6px;
}
.bar-fill{
  height:100%;background:var(--gold);
  width:0%;
  transition:width .3s ease;
  position:relative;
}
.bar-fill::after{
  content:'';position:absolute;top:0;right:0;width:30px;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,240,180,.6));
  animation:barShine .8s linear infinite;
}
@keyframes barShine{from{opacity:0}50%{opacity:1}to{opacity:0}}

/* Encoches sur la barre */
.bar-ticks{display:flex;justify-content:space-between;padding:0 2px}
.bar-tick{width:1px;height:4px;background:var(--border2);opacity:.5}

/* Texte de statut */
.status-text{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
  color:rgba(90,74,53,.8);text-transform:uppercase;
  margin-top:8px;text-align:center;min-height:16px;
}

/* Infos serveur bas */


/* Coin décorations */
.corner{position:fixed;z-index:10;width:60px;height:60px}
.corner svg{width:100%;height:100%}
.corner.tl{top:20px;left:20px}
.corner.tr{top:20px;right:20px;transform:scaleX(-1)}
.corner.bl{bottom:20px;left:20px;transform:scaleY(-1)}
.corner.br{bottom:20px;right:20px;transform:scale(-1)}

/* Animation torche */
.torch{position:fixed;z-index:5;bottom:42vh;animation:torchFlicker 2s ease-in-out infinite}
.torch.l{left:8%}
.torch.r{right:8%}
.torch svg{width:32px;height:48px}
@keyframes torchFlicker{0%,100%{filter:brightness(1)}25%{filter:brightness(1.3)}50%{filter:brightness(.9)}75%{filter:brightness(1.2)}}

/* Particules */
.particles{position:fixed;inset:0;z-index:3;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:float linear infinite}
@keyframes float{
  0%{opacity:0;transform:translateY(0) translateX(0)}
  10%{opacity:.6}
  90%{opacity:.2}
  100%{opacity:0;transform:translateY(-80vh) translateX(var(--dx))}
}
</style>
</head>

<script>
// ===== ETOILES =====
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  drawStars();
}
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 300; i++) {
    const x  = Math.random() * canvas.width;
    const y  = Math.random() * canvas.height * 0.75;
    const r  = Math.random() * 1.4 + 0.2;
    const op = Math.random() * 0.7 + 0.15;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,248,220,${op})`;
    ctx.fill();
  }
}
window.addEventListener('resize', resize);
resize();

// ===== PARTICULES ETINCELLES =====
const pCont = document.getElementById('particles');
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const x  = Math.random() * 100;
  const dx = (Math.random() - 0.5) * 60;
  const dur = Math.random() * 6 + 4;
  const delay = Math.random() * 4;
  p.style.cssText = `left:${x}%;bottom:0;--dx:${dx}px;animation-duration:${dur}s;animation-delay:${delay}s`;
  pCont.appendChild(p);
  setTimeout(() => p.remove(), (dur + delay) * 1000);
}
setInterval(spawnParticle, 300);

// ===== CHARGEMENT =====
const quotes = [
  "\"Chaque guerrier qui s'agenouille devant le trône d'Orion porte en lui la lumière des étoiles.\"",
  "\"Les pierres de nos remparts ont été posées par le sang de nos ancêtres. Honorons leur mémoire.\"",
  "\"Un Seigneur sans honneur n'est qu'un bandit couronné.\"",
  "\"La nuit la plus sombre précède toujours l'aube dorée de l'Empire.\"",
  "\"L'épée protège, mais c'est la sagesse qui gouverne.\""
];

const statuses = [
  "Connexion aux serveurs royaux...",
  "Chargement des terres de l'Empire...",
  "Préparation des armureries...",
  "Invocation des esprits ancestraux...",
  "Déploiement des bannières...",
  "Ouverture des portes du château...",
  "Bienvenue dans l'Empire Orion !"
];

let progress = 0;
const bar    = document.getElementById('bar');
const pct    = document.getElementById('pct');
const status = document.getElementById('status');
const quote  = document.getElementById('quote');

// Changer de citation toutes les 5s
let qi = 0;
setInterval(() => {
  qi = (qi + 1) % quotes.length;
  quote.style.opacity = '0';
  quote.style.transition = 'opacity .5s';
  setTimeout(() => {
    quote.innerHTML = `<em>${quotes[qi]}</em>`;
    quote.style.opacity = '1';
  }, 500);
}, 5000);

// Simuler la progression (en vrai GMod envoie les données via JS)
function updateProgress(p, text) {
  progress = Math.min(p, 100);
  bar.style.width = progress + '%';
  pct.textContent = Math.round(progress) + '%';
  if (text) status.textContent = text;
}

// GMod injecte les vraies valeurs — on simule ici pour la démo
let demo = 0;
const demoInt = setInterval(() => {
  demo += Math.random() * 8 + 2;
  const si = Math.min(Math.floor(demo / 100 * statuses.length), statuses.length - 1);
  updateProgress(demo, statuses[si]);
  if (demo >= 100) clearInterval(demoInt);
}, 200);

// ===== API GMOD LOADING =====
// Ces fonctions sont appelées par GMod automatiquement
function GameDetails(servName, servURL, mapName, maxPlayers, steamID, gameMode) {
  // On peut afficher le nom du serveur ici si besoin
}
function SetFilesTotal(total) {
  window._filesTotal = total;
}
function SetFilesNeeded(needed) {
  window._filesNeeded = needed;
}
function DownloadingFile(fileName) {
  const done   = (window._filesTotal || 1) - (window._filesNeeded || 0);
  const total  = window._filesTotal || 1;
  const p      = Math.min((done / total) * 95, 95);
  const name   = fileName.split('/').pop();
  updateProgress(p, 'Téléchargement : ' + name);
}
function LoadingComplete(mapName) {
  clearInterval(demoInt);
  updateProgress(100, 'Bienvenue dans l\'Empire Orion !');
}
</script>
