<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Shadow RP Loading</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #000;
}

/* BACKGROUND */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("https://i.imgur.com/6sXPyw4.png");
    background-size: cover;
    background-position: center;
    filter: blur(6px) brightness(0.5);
    transform: scale(1.05);
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,0,0,0.15), rgba(0,0,0,0.92));
}

/* 🔥 LOGO TOP LEFT (AJOUTÉ) */
.toplogo {
    position: absolute;
    top: 25px;
    left: 25px;
    width: 120px;
    height: auto;
    z-index: 10;
}

/* LEFT TEXT */
.left {
    position: absolute;
    top: 50%;
    left: 50px;
    transform: translateY(-50%);
    width: 320px;
    color: white;
}

.left h2 {
    font-size: 22px;
    margin-bottom: 10px;
}

.left p {
    font-size: 14px;
    opacity: 0.8;
    line-height: 1.5;
}

/* SLIDESHOW */
.slideshow {
    position: absolute;
    top: 50%;
    right: 60px;
    transform: translateY(-50%) rotate(-1deg);
    width: 850px;
    height: 520px;
    border: 6px solid rgba(255,255,255,0.08);
    box-shadow: 0 40px 120px rgba(0,0,0,0.75);
    overflow: hidden;
    background: black;
}

.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    opacity: 0;
    transition: opacity 1s ease;
}

.slideshow img.active {
    opacity: 1;
}

/* TIP */
.tip {
    position: absolute;
    bottom: 60px;
    left: 50px;
    color: #ddd;
    font-size: 14px;
    opacity: 0.85;
    max-width: 600px;
}

/* BOTTOM */
.bottom {
    position: absolute;
    bottom: 30px;
    left: 50px;
    right: 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.bar {
    width: 75%;
    height: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    width: 0%;
    height: 100%;
    background: white;
}

.right {
    text-align: right;
    color: white;
}

.percent {
    color: #f0c330;
    font-size: 18px;
    font-weight: bold;
}

.status {
    font-size: 13px;
    opacity: 0.8;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>
<div class="overlay"></div>

<!-- 🔥 LOGO AJOUTÉ -->
<img src="https://i.imgur.com/rYdidWL.png" class="toplogo">

<!-- LEFT TEXT -->
<div class="left">
    <h2>ROLEPLAY IMMERSIF</h2>
    <p>
        Plonge dans un monde où chaque choix compte.<br>
        Respecte les règles, crée ton histoire,<br>
        et développe ton personnage.
    </p>
</div>

<!-- SLIDESHOW -->
<div class="slideshow">
    <img src="https://i.imgur.com/IC56Wm2.jpeg" class="active">
    <img src="https://i.imgur.com/pwxtdTH.jpeg">
    <img src="https://i.imgur.com/7DTdVBV.jpeg">
    <img src="https://i.imgur.com/mi3lnf3.jpeg">
    <img src="https://i.imgur.com/wvLVU8e.jpeg">
</div>

<!-- TIP -->
<div class="tip" id="tip"></div>

<!-- BOTTOM -->
<div class="bottom">
    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div class="right">
        <div class="status" id="status">CHARGEMENT...</div>
        <div class="percent" id="percent">0%</div>
    </div>
</div>

<script>

const imgs = document.querySelectorAll(".slideshow img");
let index = 0;

/* slideshow */
setInterval(() => {
    imgs[index].classList.remove("active");
    index = (index + 1) % imgs.length;
    imgs[index].classList.add("active");
}, 3000);

/* loading infini */
let p = 0;
const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const status = document.getElementById("status");

const states = [
    "Connexion au serveur...",
    "Chargement des ressources...",
    "Synchronisation RP...",
    "Chargement des entités...",
    "Initialisation du monde...",
    "Vérification des scripts...",
    "Optimisation du serveur..."
];

function load() {
    p += Math.random() * 3;
    if (p > 100) p = 0;

    fill.style.width = p + "%";
    percent.textContent = Math.floor(p) + "%";

    status.textContent = states[Math.floor(Math.random() * states.length)];

    requestAnimationFrame(load);
}

load();

</script>

</body>
</html>
